version: 1

commands:
  test:
    - pnpm test
  build:
    - pnpm build
  start: []

probes:
  - name: cli help
    command: node packages/cli/dist/index.js --help
    timeoutMs: 10000
  - name: markdown analysis
    command: node packages/cli/dist/index.js analyze --format markdown
    timeoutMs: 30000

safety:
  commandTimeoutMs: 120000
  allowCommands: false

llm:
  provider: disabled
  timeoutMs: 30000

# Optional user-owned providers can be configured explicitly. CodeDecay does
# not call them unless a command opts into LLM assistance.
#
# llm:
#   provider: litellm
#   model: gpt-4.1-mini
#   endpoint: http://127.0.0.1:4000/v1
#   apiKeyEnv: LITELLM_API_KEY
#   timeoutMs: 30000
