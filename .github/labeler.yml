documentation:
  - changed-files:
    - any-glob-to-any-file:
      - "README.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
      - "CODE_OF_CONDUCT.md"
      - ".github/SUPPORT.md"
      - ".github/ISSUE_TEMPLATE/**"
      - "docs/**"
      - "**/*.md"

"type: ci":
