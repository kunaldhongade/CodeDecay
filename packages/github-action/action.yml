name: "CodeDecay"
description: "Analyze pull requests for regression risk, blast radius, missing tests, and code decay"
author: "SubmuxHQ"

inputs:
  mode:
    description: "Report mode: analyze, redteam, or agent. Command-executing modes are not supported by this action."
    required: false
    default: "analyze"
  base:
    description: "Base git ref or SHA to compare from"
    required: false
    default: ""
  head:
    description: "Head git ref or SHA to compare to"
    required: false
    default: ""
  cwd:
    description: "Working directory to analyze."
    required: false
    default: "."
  format:
    description: "Report format: json, markdown, or sarif"
    required: false
    default: "markdown"
  output:
    description: "Optional output path. Relative paths resolve from cwd; absolute paths are honored exactly."
    required: false
    default: ""
  fail-on:
    description: "Fail the workflow on low, medium, or high risk"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: "Build CodeDecay CLI"
      shell: "bash"
      run: |
        set -euo pipefail
        ACTION_ROOT="$(cd "$GITHUB_ACTION_PATH/../.." && pwd)"
        cd "$ACTION_ROOT"
        corepack enable
        pnpm install --frozen-lockfile
        pnpm --filter @submuxhq/codedecay build

    - name: "Write CodeDecay summary"
      shell: "bash"
      run: |
        set -euo pipefail
        ACTION_ROOT="$(cd "$GITHUB_ACTION_PATH/../.." && pwd)"
        CLI_PATH="$ACTION_ROOT/packages/cli/dist/index.js"
        SUMMARY_PATH="$RUNNER_TEMP/codedecay-summary.md"
        MODE="${{ inputs.mode }}"

        case "$MODE" in
          analyze|redteam|agent) ;;
          *)
            echo "Unsupported CodeDecay mode: $MODE" >&2
            echo "Expected analyze, redteam, or agent." >&2
            exit 2
            ;;
        esac

        args=("$MODE" --cwd "${{ inputs.cwd }}" --format markdown)
        if [[ -n "${{ inputs.base }}" ]]; then
          args+=(--base "${{ inputs.base }}")
        fi
        if [[ -n "${{ inputs.head }}" ]]; then
          args+=(--head "${{ inputs.head }}")
        fi

        cd "$GITHUB_WORKSPACE"
        node "$CLI_PATH" "${args[@]}" > "$SUMMARY_PATH" || true
        cat "$SUMMARY_PATH" >> "$GITHUB_STEP_SUMMARY"

    - name: "Run CodeDecay"
      shell: "bash"
      run: |
        set -euo pipefail
        ACTION_ROOT="$(cd "$GITHUB_ACTION_PATH/../.." && pwd)"
        CLI_PATH="$ACTION_ROOT/packages/cli/dist/index.js"
        MODE="${{ inputs.mode }}"
        FORMAT="${{ inputs.format }}"

        case "$MODE" in
          analyze|redteam|agent) ;;
          *)
            echo "Unsupported CodeDecay mode: $MODE" >&2
            echo "Expected analyze, redteam, or agent." >&2
            exit 2
            ;;
        esac

        if [[ "$MODE" != "analyze" && "$FORMAT" == "sarif" ]]; then
          echo "CodeDecay mode '$MODE' does not support SARIF output." >&2
          echo "Use format: markdown or json, or use mode: analyze for SARIF." >&2
          exit 2
        fi

        args=("$MODE" --cwd "${{ inputs.cwd }}" --format "$FORMAT")
        if [[ -n "${{ inputs.base }}" ]]; then
          args+=(--base "${{ inputs.base }}")
        fi
        if [[ -n "${{ inputs.head }}" ]]; then
          args+=(--head "${{ inputs.head }}")
        fi
        if [[ -n "${{ inputs.output }}" ]]; then
          args+=(--output "${{ inputs.output }}")
        fi
        if [[ "$MODE" != "agent" && -n "${{ inputs.fail-on }}" ]]; then
          args+=(--fail-on "${{ inputs.fail-on }}")
        fi

        cd "$GITHUB_WORKSPACE"
        node "$CLI_PATH" "${args[@]}"
