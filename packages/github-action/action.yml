name: "CodeDecay"
description: "Analyze pull requests for regression risk, blast radius, missing tests, and code decay"
author: "SubmuxHQ"

inputs:
  mode:
    description: "Mode: analyze, redteam, agent, or product. Product mode runs only explicit codedecay product workflows."
    required: false
    default: "analyze"
  base:
    description: "Base git ref or SHA to compare from"
    required: false
    default: ""
  head:
    description: "Head git ref or SHA to compare to"
    required: false
    default: ""
  cwd:
    description: "Working directory to analyze."
    required: false
    default: "."
  format:
    description: "Report format: json, markdown, sarif, or pr-comment for analyze mode"
    required: false
    default: "markdown"
  output:
    description: "Optional output path. Relative paths resolve from cwd; absolute paths are honored exactly."
    required: false
    default: ""
  github-token:
    description: "GitHub token used to post or update the sticky pull request comment."
    required: false
    default: "${{ github.token }}"
  fail-on:
    description: "Fail the workflow on low, medium, or high risk"
    required: false
    default: ""
  target:
    description: "Product mode target id to run"
    required: false
    default: ""
  preview-url:
    description: "Product mode preview URL exported as CODEDECAY_PRODUCT_PREVIEW_URL"
    required: false
    default: ""
  product-explore:
    description: "Product mode: crawl same-origin product flows"
    required: false
    default: "false"
  product-generate-tests:
    description: "Product mode: generate reviewable UI tests"
    required: false
    default: "false"
  product-run-generated-tests:
    description: "Product mode: run generated UI tests"
    required: false
    default: "false"
  product-generate-api-tests:
    description: "Product mode: generate reviewable API tests"
    required: false
    default: "false"
  product-run-generated-api-tests:
    description: "Product mode: run generated API tests"
    required: false
    default: "false"
  product-fail-on-classification:
    description: "Product mode: comma-separated failure classifications that should fail the workflow"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: "Build CodeDecay CLI"
      shell: "bash"
      run: |
        set -euo pipefail
        ACTION_ROOT="$(cd "$GITHUB_ACTION_PATH/../.." && pwd)"
        cd "$ACTION_ROOT"
        corepack enable
        pnpm install --frozen-lockfile
        pnpm --filter @submuxhq/codedecay build

    - name: "Write CodeDecay summary"
      shell: "bash"
      run: |
        set -euo pipefail
        ACTION_ROOT="$(cd "$GITHUB_ACTION_PATH/../.." && pwd)"
        CLI_PATH="$ACTION_ROOT/packages/cli/dist/index.js"
        SUMMARY_PATH="$RUNNER_TEMP/codedecay-summary.md"
        MODE="${{ inputs.mode }}"

        if [[ "$MODE" == "product" ]]; then
          exit 0
        fi

        case "$MODE" in
          analyze|redteam|agent) ;;
          *)
            echo "Unsupported CodeDecay mode: $MODE" >&2
            echo "Expected analyze, redteam, agent, or product." >&2
            exit 2
            ;;
        esac

        args=("$MODE" --cwd "${{ inputs.cwd }}" --format markdown)
        if [[ -n "${{ inputs.base }}" ]]; then
          args+=(--base "${{ inputs.base }}")
        fi
        if [[ -n "${{ inputs.head }}" ]]; then
          args+=(--head "${{ inputs.head }}")
        fi

        cd "$GITHUB_WORKSPACE"
        node "$CLI_PATH" "${args[@]}" > "$SUMMARY_PATH" || true
        cat "$SUMMARY_PATH" >> "$GITHUB_STEP_SUMMARY"

    - name: "Post CodeDecay pull request comment"
      shell: "bash"
      env:
        CODEDECAY_GITHUB_TOKEN: "${{ inputs.github-token }}"
      run: |
        set -uo pipefail
        ACTION_ROOT="$(cd "$GITHUB_ACTION_PATH/../.." && pwd)"
        CLI_PATH="$ACTION_ROOT/packages/cli/dist/index.js"
        COMMENT_MARKER="<!-- codedecay-action-report -->"
        COMMENT_RENDERED="$RUNNER_TEMP/codedecay-pr-comment-rendered.md"
        COMMENT_BODY="$RUNNER_TEMP/codedecay-pr-comment.md"
        COMMENT_PAYLOAD="$RUNNER_TEMP/codedecay-pr-comment.json"
        PR_META="$RUNNER_TEMP/codedecay-pr-meta.env"

        if [[ -z "${CODEDECAY_GITHUB_TOKEN:-}" ]]; then
          echo "CodeDecay PR comment skipped: github-token input is empty."
          exit 0
        fi

        if [[ "${GITHUB_EVENT_NAME:-}" != "pull_request" && "${GITHUB_EVENT_NAME:-}" != "pull_request_target" ]]; then
          echo "CodeDecay PR comment skipped: event is not pull_request."
          exit 0
        fi

        if [[ -z "${GITHUB_EVENT_PATH:-}" || ! -f "$GITHUB_EVENT_PATH" ]]; then
          echo "CodeDecay PR comment skipped: GITHUB_EVENT_PATH is unavailable."
          exit 0
        fi

        if ! node -e 'const fs = require("node:fs"); const event = JSON.parse(fs.readFileSync(process.argv[1], "utf8")); const fullName = event.repository?.full_name; const number = event.pull_request?.number; if (!fullName || !number) process.exit(1); const [owner, repo] = fullName.split("/"); console.log("owner=" + owner); console.log("repo=" + repo); console.log("number=" + number);' "$GITHUB_EVENT_PATH" > "$PR_META"; then
          echo "CodeDecay PR comment skipped: pull request metadata is unavailable."
          exit 0
        fi

        # shellcheck disable=SC1090
        source "$PR_META"

        args=("analyze" --cwd "${{ inputs.cwd }}" --format pr-comment)
        if [[ -n "${{ inputs.base }}" ]]; then
          args+=(--base "${{ inputs.base }}")
        fi
        if [[ -n "${{ inputs.head }}" ]]; then
          args+=(--head "${{ inputs.head }}")
        fi

        cd "$GITHUB_WORKSPACE"
        if ! node "$CLI_PATH" "${args[@]}" > "$COMMENT_RENDERED"; then
          echo "CodeDecay PR comment skipped: failed to render pr-comment report."
          exit 0
        fi

        {
          echo "$COMMENT_MARKER"
          cat "$COMMENT_RENDERED"
        } > "$COMMENT_BODY"

        node -e 'const fs = require("node:fs"); const body = fs.readFileSync(process.argv[1], "utf8"); fs.writeFileSync(process.argv[2], JSON.stringify({ body }), "utf8");' "$COMMENT_BODY" "$COMMENT_PAYLOAD"

        export GH_TOKEN="$CODEDECAY_GITHUB_TOKEN"
        if ! comment_id="$(gh api "repos/$owner/$repo/issues/$number/comments?per_page=100" --paginate --jq '.[] | select(.body != null and (.body | contains("<!-- codedecay-action-report -->"))) | .id' | head -n 1)"; then
          echo "CodeDecay PR comment skipped: failed to list existing PR comments."
          exit 0
        fi

        if [[ -n "$comment_id" ]]; then
          if ! gh api --method PATCH "repos/$owner/$repo/issues/comments/$comment_id" --input "$COMMENT_PAYLOAD" > /dev/null; then
            echo "CodeDecay PR comment skipped: failed to update existing PR comment."
          fi
          exit 0
        fi

        if ! gh api --method POST "repos/$owner/$repo/issues/$number/comments" --input "$COMMENT_PAYLOAD" > /dev/null; then
          echo "CodeDecay PR comment skipped: failed to create PR comment."
        fi

    - name: "Run CodeDecay"
      shell: "bash"
      run: |
        set -euo pipefail
        ACTION_ROOT="$(cd "$GITHUB_ACTION_PATH/../.." && pwd)"
        CLI_PATH="$ACTION_ROOT/packages/cli/dist/index.js"
        MODE="${{ inputs.mode }}"
        FORMAT="${{ inputs.format }}"
        SUMMARY_PATH="$RUNNER_TEMP/codedecay-product-summary.md"

        case "$MODE" in
          analyze|redteam|agent|product) ;;
          *)
            echo "Unsupported CodeDecay mode: $MODE" >&2
            echo "Expected analyze, redteam, agent, or product." >&2
            exit 2
            ;;
        esac

        if [[ "$MODE" == "product" && "$FORMAT" == "sarif" ]]; then
          echo "CodeDecay mode 'product' does not support SARIF output." >&2
          echo "Use format: markdown or json." >&2
          exit 2
        fi

        if [[ "$MODE" != "analyze" && "$FORMAT" == "sarif" ]]; then
          echo "CodeDecay mode '$MODE' does not support SARIF output." >&2
          echo "Use format: markdown or json, or use mode: analyze for SARIF." >&2
          exit 2
        fi

        if [[ "$MODE" == "product" ]]; then
          args=("product" --cwd "${{ inputs.cwd }}" --format "$FORMAT")
          if [[ -n "${{ inputs.target }}" ]]; then
            args+=(--target "${{ inputs.target }}")
          fi
          if [[ -n "${{ inputs.preview-url }}" ]]; then
            export CODEDECAY_PRODUCT_PREVIEW_URL="${{ inputs.preview-url }}"
          fi
          if [[ "${{ inputs.product-explore }}" == "true" ]]; then
            args+=(--explore)
          fi
          if [[ "${{ inputs.product-generate-tests }}" == "true" ]]; then
            args+=(--generate-tests)
          fi
          if [[ "${{ inputs.product-run-generated-tests }}" == "true" ]]; then
            args+=(--run-generated-tests)
          fi
          if [[ "${{ inputs.product-generate-api-tests }}" == "true" ]]; then
            args+=(--generate-api-tests)
          fi
          if [[ "${{ inputs.product-run-generated-api-tests }}" == "true" ]]; then
            args+=(--run-generated-api-tests)
          fi
          if [[ -n "${{ inputs.product-fail-on-classification }}" ]]; then
            args+=(--fail-on-classification "${{ inputs.product-fail-on-classification }}")
          fi
          if [[ -n "${{ inputs.output }}" ]]; then
            args+=(--output "${{ inputs.output }}")
          fi
        else
          args=("$MODE" --cwd "${{ inputs.cwd }}" --format "$FORMAT")
          if [[ -n "${{ inputs.base }}" ]]; then
            args+=(--base "${{ inputs.base }}")
          fi
          if [[ -n "${{ inputs.head }}" ]]; then
            args+=(--head "${{ inputs.head }}")
          fi
          if [[ -n "${{ inputs.output }}" ]]; then
            args+=(--output "${{ inputs.output }}")
          fi
          if [[ "$MODE" != "agent" && -n "${{ inputs.fail-on }}" ]]; then
            args+=(--fail-on "${{ inputs.fail-on }}")
          fi
        fi

        cd "$GITHUB_WORKSPACE"
        if [[ "$MODE" == "product" && "$FORMAT" == "markdown" ]]; then
          set +e
          if [[ -n "${{ inputs.output }}" ]]; then
            node "$CLI_PATH" "${args[@]}"
            status=$?
            output_path="${{ inputs.output }}"
            if [[ "$output_path" = /* ]]; then
              summary_source="$output_path"
            else
              summary_source="$GITHUB_WORKSPACE/${{ inputs.cwd }}/$output_path"
            fi
            if [[ -f "$summary_source" ]]; then
              cat "$summary_source" >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            node "$CLI_PATH" "${args[@]}" | tee "$SUMMARY_PATH"
            status=$?
            cat "$SUMMARY_PATH" >> "$GITHUB_STEP_SUMMARY"
          fi
          set -e
          exit "$status"
        else
          node "$CLI_PATH" "${args[@]}"
        fi
